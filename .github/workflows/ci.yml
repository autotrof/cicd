name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-with-bun:
    runs-on: alpine-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
  run-with-node:
    runs-on: alpine-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '23.9.0'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test